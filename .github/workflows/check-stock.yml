name: Starbucks Stock Checker

on:
  schedule:
    # 4시간마다 실행 (UTC 기준: 0, 4, 8, 12, 16, 20시)
    # 한국 기준: 9, 13, 17, 21, 01, 05시
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      jan_code:
        description: "상품 JAN 코드 (기본값 사용 시 비워두세요 / 테스트용: 4524785531086)"
        required: false
        default: ""
      force_notify:
        description: "이메일 테스트용 강제 알림 (true 입력 시 재고 여부 무관하게 이메일 발송)"
        required: false
        default: "false"

jobs:
  check-stock:
    name: Check Starbucks Japan Stock
    runs-on: ubuntu-latest

    steps:
      # ── 1. Playwright 설치 ───────────────────────────────────────────────────
      - name: Install Playwright
        run: |
          pip install playwright -q
          playwright install chromium --with-deps

      # ── 2. 재고 확인 (Playwright 헤드리스 브라우저, JS 완전 실행) ────────────
      - name: Check stock via Playwright
        id: stock
        env:
          JAN_CODE: ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
        run: |
          python3 - <<'PYEOF'
          import os
          from playwright.sync_api import sync_playwright

          jan_code  = os.environ["JAN_CODE"]
          gh_output = os.environ["GITHUB_OUTPUT"]

          PAGE_URL = "https://www.starbucks.co.jp/mystarbucks/reward/exchange/original_goods/"

          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
          print("  Starbucks Stock Checker (Playwright)")
          print(f"  JAN 코드 : {jan_code}")
          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")

          with sync_playwright() as p:
            browser = p.chromium.launch(headless=True)
            page = browser.new_page(
              locale="ja-JP",
              extra_http_headers={"Accept-Language": "ja-JP,ja;q=0.9"},
            )

            print("  [1/3] 페이지 로드 중...")
            page.goto(PAGE_URL, wait_until="networkidle", timeout=60000)
            print("  [2/3] JS 실행 완료, DOM 확인 중...")

            # data-jan이 일치하는 form 내 outofstock 버튼 선택
            outofstock_btn = page.locator(
              f'form.js-cartform[data-jan="{jan_code}"] .js-cartform-outofstock'
            )

            if outofstock_btn.count() == 0:
              status = "not_found"
              print(f"  결과 : ⚠️  JAN 코드 {jan_code} 를 페이지에서 찾을 수 없음")
            else:
              classes = outofstock_btn.get_attribute("class") or ""
              print(f"  outofstock 버튼 클래스: {classes}")
              if "hide" in classes.split():
                status = "in_stock"
                print("  결과 : ✅ 재고 있음 (outofstock 버튼 숨김 확인)")
              else:
                status = "out_of_stock"
                print("  결과 : ❌ 품절 (outofstock 버튼 표시 중)")

            browser.close()

          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")

          with open(gh_output, "a") as f:
            f.write(f"stock_status={status}\n")
            f.write(f"final_url={PAGE_URL}\n")
          PYEOF

      # ── 3. 재고 있을 때만 이메일 발송 ────────────────────────────────────────
      - name: Send email notification
        if: steps.stock.outputs.stock_status == 'in_stock' || inputs.force_notify == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Starbucks Stock Bot <${{ secrets.GMAIL_USER }}>"
          subject: "${{ inputs.force_notify == 'true' && '🧪 [테스트 메일] 스타벅스 재고 알림 테스트' || '🎉 [재입고 알림] 스타벅스 JPN 한정 컵 구매 가능!' }}"
          body: |
            ${{ inputs.force_notify == 'true' && '⚠️ 이 메일은 테스트 발송입니다. 실제 재고와 무관합니다.' || '안녕하세요!' }}

            스타벅스 재팬 한정 컵 상품이 재입고되었을 가능성이 감지되었습니다.

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              상품 JAN 코드 : ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
              감지 시각      : ${{ github.event.repository.updated_at }}
              최종 도달 URL  : ${{ steps.stock.outputs.final_url }}
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

            지금 바로 확인해 보세요:
            https://cart.starbucks.co.jp/api/star-login?jan_code=${{ vars.JAN_CODE || '4524785613492' }}

            ─────────────────────────────────
            이 메일은 GitHub Actions Bot이 자동 발송했습니다.
            (4시간마다 재고를 자동 확인합니다)

      # ── 3. 결과 요약 (Actions 탭에서 확인용) ──────────────────────────────────
      - name: Job summary
        if: always()
        env:
          JAN_CODE: ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
          STOCK_STATUS: ${{ steps.stock.outputs.stock_status }}
          FINAL_URL: ${{ steps.stock.outputs.final_url }}
          FORCE_NOTIFY: ${{ inputs.force_notify || 'false' }}
        run: |
          {
            echo "## Starbucks Stock Check Result"
            echo ""
            echo "| 항목 | 값 |"
            echo "|------|-----|"
            echo "| 상품 JAN 코드 | \`${JAN_CODE}\` |"
            echo "| 재고 상태 | **${STOCK_STATUS}** |"
            echo "| 최종 URL | ${FINAL_URL} |"
            echo "| 강제 알림 (테스트) | ${FORCE_NOTIFY} |"
            echo "| 확인 시각 (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |"
            echo "| 확인 시각 (JST) | $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S') |"
          } >> "$GITHUB_STEP_SUMMARY"

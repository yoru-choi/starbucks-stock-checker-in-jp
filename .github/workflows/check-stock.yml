name: Starbucks Stock Checker

on:
  schedule:
    # 4시간마다 실행 (UTC 기준: 0, 4, 8, 12, 16, 20시)
    # 한국 기준: 9, 13, 17, 21, 01, 05시
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      jan_code:
        description: "상품 JAN 코드 (기본값 사용 시 비워두세요 / 테스트용: 4524785531086)"
        required: false
        default: ""
      force_notify:
        description: "이메일 테스트용 강제 알림 (true 입력 시 재고 여부 무관하게 이메일 발송)"
        required: false
        default: "false"

jobs:
  check-stock:
    name: Check Starbucks Japan Stock
    runs-on: ubuntu-latest

    steps:
      # ── 1. 재고 확인 (로그인 후 재고 확인) ──────────────────────────────────
      - name: Check stock via login flow
        id: stock
        env:
          JAN_CODE: ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
          SBUX_EMAIL: ${{ secrets.SBUX_EMAIL }}
          SBUX_PASSWORD: ${{ secrets.SBUX_PASSWORD }}
        run: |
          COOKIE_JAR="/tmp/sbux-cookies.txt"
          LOGIN_HTML="/tmp/sbux-login.html"
          CALLBACK_HTML="/tmp/sbux-callback.html"
          ENTRY_URL="https://cart.starbucks.co.jp/api/star-login?jan_code=${JAN_CODE}"

          CURL_OPTS=(
            --silent
            --location
            --max-redirs 20
            --connect-timeout 15
            --max-time 30
            --cookie "${COOKIE_JAR}"
            --cookie-jar "${COOKIE_JAR}"
            --header "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
            --header "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
            --header "Accept-Language: ja-JP,ja;q=0.9"
          )

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Starbucks Stock Checker"
          echo "  $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  JAN 코드 : ${JAN_CODE}"
          echo ""

          # ── STEP 1: 진입 URL → 로그인 페이지까지 리다이렉트 추적 ──────────
          echo "  [1/4] 로그인 페이지 로드 중..."
          LOGIN_URL_INFO=$(curl "${CURL_OPTS[@]}" \
            --write-out "%{url_effective}" \
            --output "${LOGIN_HTML}" \
            "${ENTRY_URL}"
          )
          echo "  로그인 페이지 URL: ${LOGIN_URL_INFO}"

          # ── STEP 2: form action URL 및 hidden field 추출 ─────────────────
          # form action (로그인 POST 엔드포인트)
          FORM_ACTION=$(grep -oP '(?<=action=")[^"]+' "${LOGIN_HTML}" | head -1)
          if [ -z "${FORM_ACTION}" ]; then
            # 싱글쿼트 fallback
            FORM_ACTION=$(grep -oP "(?<=action=')[^']+" "${LOGIN_HTML}" | head -1)
          fi
          echo "  form action: ${FORM_ACTION}"

          # _csrf 토큰 추출 (name="_csrf" or name="csrf_token" 등)
          CSRF=$(grep -oP '(?<=name="_csrf" value=")[^"]+' "${LOGIN_HTML}" | head -1)
          if [ -z "${CSRF}" ]; then
            CSRF=$(grep -oP '(?<=name="csrf" value=")[^"]+' "${LOGIN_HTML}" | head -1)
          fi
          if [ -z "${CSRF}" ]; then
            CSRF=$(grep -oP '(?<=name="_token" value=")[^"]+' "${LOGIN_HTML}" | head -1)
          fi
          echo "  CSRF 토큰: ${CSRF:-없음}"

          # state, nonce 추출 (OAuth 파라미터)
          STATE=$(grep -oP '(?<=name="state" value=")[^"]+' "${LOGIN_HTML}" | head -1)
          NONCE=$(grep -oP '(?<=name="nonce" value=")[^"]+' "${LOGIN_HTML}" | head -1)
          echo "  state: ${STATE:-없음}, nonce: ${NONCE:-없음}"

          # form action이 상대경로면 절대경로로 변환
          if echo "${FORM_ACTION}" | grep -q "^/"; then
            FORM_ACTION="https://login.starbucks.co.jp${FORM_ACTION}"
          fi

          # ── STEP 3: 로그인 POST ───────────────────────────────────────────
          echo ""
          echo "  [2/4] 로그인 POST 중..."

          POST_DATA="email=${SBUX_EMAIL}&password=${SBUX_PASSWORD}"
          [ -n "${CSRF}" ]  && POST_DATA="${POST_DATA}&_csrf=${CSRF}"
          [ -n "${STATE}" ] && POST_DATA="${POST_DATA}&state=${STATE}"
          [ -n "${NONCE}" ] && POST_DATA="${POST_DATA}&nonce=${NONCE}"

          LOGIN_RESULT=$(curl "${CURL_OPTS[@]}" \
            --write-out "%{url_effective}\n%{http_code}" \
            --output "${CALLBACK_HTML}" \
            --request POST \
            --data-urlencode "email=${SBUX_EMAIL}" \
            --data-urlencode "password=${SBUX_PASSWORD}" \
            $([ -n "${CSRF}" ]  && echo "--data-urlencode _csrf=${CSRF}") \
            $([ -n "${STATE}" ] && echo "--data-urlencode state=${STATE}") \
            $([ -n "${NONCE}" ] && echo "--data-urlencode nonce=${NONCE}") \
            --header "Referer: ${LOGIN_URL_INFO}" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            "${FORM_ACTION:-https://login.starbucks.co.jp/login}"
          )

          FINAL_URL=$(echo "${LOGIN_RESULT}" | head -1)
          HTTP_STATUS=$(echo "${LOGIN_RESULT}" | tail -1)

          echo "  최종 도달 URL  : ${FINAL_URL}"
          echo "  최종 HTTP 상태 : ${HTTP_STATUS}"

          # ── STEP 4: 재고 판단 ─────────────────────────────────────────────
          echo ""
          echo "  [3/4] 재고 판단 중..."
          if echo "${FINAL_URL}" | grep --quiet "error_code=110"; then
            echo "  결과 : ❌ 품절 (error_code=110 감지됨)"
            echo "stock_status=out_of_stock" >> "$GITHUB_OUTPUT"
          elif echo "${FINAL_URL}" | grep --quiet "star_cart"; then
            echo "  결과 : ✅ 재고 있음 (star_cart 도달 확인)"
            echo "stock_status=in_stock"     >> "$GITHUB_OUTPUT"
          elif echo "${FINAL_URL}" | grep --quiet "login"; then
            echo "  결과 : ⚠️  로그인 실패 (자격증명 오류 또는 세션 문제)"
            echo "stock_status=login_failed" >> "$GITHUB_OUTPUT"
          else
            echo "  결과 : ⚠️  알 수 없는 상태 (URL 확인 필요)"
            echo "stock_status=unknown"      >> "$GITHUB_OUTPUT"
          fi
          echo "final_url=${FINAL_URL}" >> "$GITHUB_OUTPUT"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 2. 재고 있을 때만 이메일 발송 ────────────────────────────────────────
      - name: Send email notification
        if: steps.stock.outputs.stock_status == 'in_stock' || inputs.force_notify == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Starbucks Stock Bot <${{ secrets.GMAIL_USER }}>"
          subject: "${{ inputs.force_notify == 'true' && '🧪 [테스트 메일] 스타벅스 재고 알림 테스트' || '🎉 [재입고 알림] 스타벅스 JPN 한정 컵 구매 가능!' }}"
          body: |
            ${{ inputs.force_notify == 'true' && '⚠️ 이 메일은 테스트 발송입니다. 실제 재고와 무관합니다.' || '안녕하세요!' }}

            스타벅스 재팬 한정 컵 상품이 재입고되었을 가능성이 감지되었습니다.

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              상품 JAN 코드 : ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
              감지 시각      : ${{ github.event.repository.updated_at }}
              최종 도달 URL  : ${{ steps.stock.outputs.final_url }}
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

            지금 바로 확인해 보세요:
            https://cart.starbucks.co.jp/api/star-login?jan_code=${{ vars.JAN_CODE || '4524785613492' }}

            ─────────────────────────────────
            이 메일은 GitHub Actions Bot이 자동 발송했습니다.
            (4시간마다 재고를 자동 확인합니다)

      # ── 3. 결과 요약 (Actions 탭에서 확인용) ──────────────────────────────────
      - name: Job summary
        if: always()
        env:
          JAN_CODE: ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
          STOCK_STATUS: ${{ steps.stock.outputs.stock_status }}
          FINAL_URL: ${{ steps.stock.outputs.final_url }}
          FORCE_NOTIFY: ${{ inputs.force_notify || 'false' }}
        run: |
          {
            echo "## Starbucks Stock Check Result"
            echo ""
            echo "| 항목 | 값 |"
            echo "|------|-----|"
            echo "| 상품 JAN 코드 | \`${JAN_CODE}\` |"
            echo "| 재고 상태 | **${STOCK_STATUS}** |"
            echo "| 최종 URL | ${FINAL_URL} |"
            echo "| 강제 알림 (테스트) | ${FORCE_NOTIFY} |"
            echo "| 확인 시각 (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |"
            echo "| 확인 시각 (JST) | $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S') |"
          } >> "$GITHUB_STEP_SUMMARY"

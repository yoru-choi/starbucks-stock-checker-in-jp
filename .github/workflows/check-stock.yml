name: Starbucks Stock Checker

on:
  schedule:
    # Runs every 4 hours (UTC: 0, 4, 8, 12, 16, 20 / JST: 9, 13, 17, 21, 1, 5)
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      jan_code:
        description: "Product JAN code (leave blank to use default; test item with stock: 4524785531086)"
        required: false
        default: ""
      force_notify:
        description: "Force email for testing (set true to send email regardless of stock status)"
        required: false
        default: "false"

jobs:
  check-stock:
    name: Check Starbucks Japan Stock
    runs-on: ubuntu-latest

    steps:
      # ── 1. Install Playwright ──────────────────────────────────────────────────
      - name: Install Playwright
        run: |
          pip install playwright -q
          playwright install chromium --with-deps

      # ── 2. Check stock (Playwright headless browser, full JS execution) ────────
      - name: Check stock via Playwright
        id: stock
        env:
          JAN_CODE: ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
        run: |
          python3 - <<'PYEOF'
          import os
          from playwright.sync_api import sync_playwright

          jan_code  = os.environ["JAN_CODE"]
          gh_output = os.environ["GITHUB_OUTPUT"]

          PAGE_URL = "https://www.starbucks.co.jp/mystarbucks/reward/exchange/original_goods/"

          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
          print("  Starbucks Stock Checker (Playwright)")
          print(f"  JAN Code : {jan_code}")
          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")

          with sync_playwright() as p:
            browser = p.chromium.launch(headless=True)
            page = browser.new_page(
              locale="ja-JP",
              extra_http_headers={"Accept-Language": "ja-JP,ja;q=0.9"},
            )

            print("  [1/3] Loading page...")
            page.goto(PAGE_URL, wait_until="networkidle", timeout=60000)
            print("  [2/3] JS executed, inspecting DOM...")

            # Select the outofstock button inside the form matching data-jan (first match only)
            outofstock_locator = page.locator(
              f'form.js-cartform[data-jan="{jan_code}"] .js-cartform-outofstock'
            )
            outofstock_btn = outofstock_locator.first

            if outofstock_locator.count() == 0:
              status = "not_found"
              print(f"  Result : ⚠️  JAN code {jan_code} not found on the page")
            else:
              classes = outofstock_btn.get_attribute("class") or ""
              print(f"  outofstock button classes: {classes}")
              if "hide" in classes.split():
                status = "in_stock"
                print("  Result : ✅ In stock (outofstock button is hidden)")
              else:
                status = "out_of_stock"
                print("  Result : ❌ Out of stock (outofstock button is visible)")

            browser.close()

          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")

          with open(gh_output, "a") as f:
            f.write(f"stock_status={status}\n")
            f.write(f"final_url={PAGE_URL}\n")
          PYEOF

      # ── 3. Send email notification (only when in stock or force_notify is true) ─
      - name: Send email notification
        if: steps.stock.outputs.stock_status == 'in_stock' || inputs.force_notify == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Starbucks Stock Bot <${{ secrets.GMAIL_USER }}>"
          subject: "${{ inputs.force_notify == 'true' && '🧪 [TEST] Starbucks Stock Checker - test notification' || '🎉 [RESTOCK ALERT] Starbucks Japan limited item is available!' }}"
          body: |
            ${{ inputs.force_notify == 'true' && '⚠️ This is a test notification. It does not reflect actual stock status.' || 'Hello!' }}

            A potential restock has been detected for a Starbucks Japan limited item.

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              Product JAN Code : ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
              Detected At      : ${{ github.event.repository.updated_at }}
              Page URL         : ${{ steps.stock.outputs.final_url }}
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

            Check availability now:
            https://cart.starbucks.co.jp/api/star-login?jan_code=${{ vars.JAN_CODE || '4524785613492' }}

            ─────────────────────────────────
            This email was sent automatically by GitHub Actions Bot.
            (Stock is checked every 4 hours)

      # ── 4. Job summary (visible in the Actions tab) ───────────────────────────
      - name: Job summary
        if: always()
        env:
          JAN_CODE: ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
          STOCK_STATUS: ${{ steps.stock.outputs.stock_status }}
          FINAL_URL: ${{ steps.stock.outputs.final_url }}
          FORCE_NOTIFY: ${{ inputs.force_notify || 'false' }}
        run: |
          {
            echo "## Starbucks Stock Check Result"
            echo ""
            echo "| Field | Value |"
            echo "|------|-----|"
            echo "| Product JAN Code | \`${JAN_CODE}\` |"
            echo "| Stock Status | **${STOCK_STATUS}** |"
            echo "| Page URL | ${FINAL_URL} |"
            echo "| Force Notify (test) | ${FORCE_NOTIFY} |"
            echo "| Checked At (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |"
            echo "| Checked At (JST) | $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S') |"
          } >> "$GITHUB_STEP_SUMMARY"

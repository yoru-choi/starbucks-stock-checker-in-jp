name: Starbucks Stock Checker

on:
  schedule:
    # 4시간마다 실행 (UTC 기준: 0, 4, 8, 12, 16, 20시)
    # 한국 기준: 9, 13, 17, 21, 01, 05시
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      jan_code:
        description: "상품 JAN 코드 (기본값 사용 시 비워두세요 / 테스트용: 4524785531086)"
        required: false
        default: ""
      force_notify:
        description: "이메일 테스트용 강제 알림 (true 입력 시 재고 여부 무관하게 이메일 발송)"
        required: false
        default: "false"

jobs:
  check-stock:
    name: Check Starbucks Japan Stock
    runs-on: ubuntu-latest

    steps:
      # ── 1. 재고 확인 (Python requests 기반 로그인 플로우) ───────────────────
      - name: Install Python dependencies
        run: pip install requests --quiet

      - name: Check stock via login flow
        id: stock
        env:
          JAN_CODE: ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
          SBUX_EMAIL: ${{ secrets.SBUX_EMAIL }}
          SBUX_PASSWORD: ${{ secrets.SBUX_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import os, sys
          from html.parser import HTMLParser
          import requests

          jan_code  = os.environ["JAN_CODE"]
          email     = os.environ["SBUX_EMAIL"]
          password  = os.environ["SBUX_PASSWORD"]
          gh_output = os.environ["GITHUB_OUTPUT"]

          ENTRY_URL = f"https://cart.starbucks.co.jp/api/star-login?jan_code={jan_code}"
          HEADERS = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36",
            "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
            "Accept-Language": "ja-JP,ja;q=0.9",
          }

          class FormParser(HTMLParser):
            def __init__(self):
              super().__init__()
              self.action = None
              self.fields = {}
              self._in_form = False
            def handle_starttag(self, tag, attrs):
              a = dict(attrs)
              if tag == "form":
                self._in_form = True
                self.action = a.get("action")
              if tag == "input" and self._in_form:
                name = a.get("name")
                val  = a.get("value", "")
                if name:
                  self.fields[name] = val
            def handle_endtag(self, tag):
              if tag == "form":
                self._in_form = False

          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
          print("  Starbucks Stock Checker (Python)")
          print(f"  JAN 코드 : {jan_code}")
          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")

          session = requests.Session()
          session.headers.update(HEADERS)

          # STEP 1: 진입 → 로그인 페이지 로드
          print("\n  [1/3] 로그인 페이지 로드 중...")
          r1 = session.get(ENTRY_URL, allow_redirects=True, timeout=30)
          login_url = r1.url
          print(f"  로그인 페이지 URL : {login_url}")

          # STEP 2: form 파싱
          parser = FormParser()
          parser.feed(r1.text)
          action = parser.action or "/login"
          if action.startswith("/"):
            action = "https://login.starbucks.co.jp" + action
          print(f"  form action       : {action}")
          print(f"  hidden fields     : {list(parser.fields.keys())}")

          # STEP 3: 로그인 POST
          print("\n  [2/3] 로그인 POST 중...")
          payload = {**parser.fields, "email": email, "password": password}
          r2 = session.post(
            action,
            data=payload,
            allow_redirects=True,
            timeout=30,
            headers={"Referer": login_url, "Content-Type": "application/x-www-form-urlencoded"},
          )
          final_url = r2.url
          print(f"  최종 도달 URL     : {final_url}")
          print(f"  최종 HTTP 상태    : {r2.status_code}")

          # STEP 4: 재고 판단
          print("\n  [3/3] 재고 판단 중...")
          if "error_code=110" in final_url:
            status = "out_of_stock"
            print("  결과 : ❌ 품절 (error_code=110 감지됨)")
          elif "star_cart" in final_url:
            status = "in_stock"
            print("  결과 : ✅ 재고 있음 (star_cart 도달 확인)")
          elif "login" in final_url:
            status = "login_failed"
            print("  결과 : ⚠️  로그인 실패 (자격증명 오류 또는 세션 문제)")
          else:
            status = "unknown"
            print(f"  결과 : ⚠️  알 수 없는 상태")

          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")

          with open(gh_output, "a") as f:
            f.write(f"stock_status={status}\n")
            f.write(f"final_url={final_url}\n")
          PYEOF

      # ── 2. 재고 있을 때만 이메일 발송 ────────────────────────────────────────
      - name: Send email notification
        if: steps.stock.outputs.stock_status == 'in_stock' || inputs.force_notify == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Starbucks Stock Bot <${{ secrets.GMAIL_USER }}>"
          subject: "${{ inputs.force_notify == 'true' && '🧪 [테스트 메일] 스타벅스 재고 알림 테스트' || '🎉 [재입고 알림] 스타벅스 JPN 한정 컵 구매 가능!' }}"
          body: |
            ${{ inputs.force_notify == 'true' && '⚠️ 이 메일은 테스트 발송입니다. 실제 재고와 무관합니다.' || '안녕하세요!' }}

            스타벅스 재팬 한정 컵 상품이 재입고되었을 가능성이 감지되었습니다.

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              상품 JAN 코드 : ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
              감지 시각      : ${{ github.event.repository.updated_at }}
              최종 도달 URL  : ${{ steps.stock.outputs.final_url }}
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

            지금 바로 확인해 보세요:
            https://cart.starbucks.co.jp/api/star-login?jan_code=${{ vars.JAN_CODE || '4524785613492' }}

            ─────────────────────────────────
            이 메일은 GitHub Actions Bot이 자동 발송했습니다.
            (4시간마다 재고를 자동 확인합니다)

      # ── 3. 결과 요약 (Actions 탭에서 확인용) ──────────────────────────────────
      - name: Job summary
        if: always()
        env:
          JAN_CODE: ${{ inputs.jan_code || vars.JAN_CODE || '4524785613492' }}
          STOCK_STATUS: ${{ steps.stock.outputs.stock_status }}
          FINAL_URL: ${{ steps.stock.outputs.final_url }}
          FORCE_NOTIFY: ${{ inputs.force_notify || 'false' }}
        run: |
          {
            echo "## Starbucks Stock Check Result"
            echo ""
            echo "| 항목 | 값 |"
            echo "|------|-----|"
            echo "| 상품 JAN 코드 | \`${JAN_CODE}\` |"
            echo "| 재고 상태 | **${STOCK_STATUS}** |"
            echo "| 최종 URL | ${FINAL_URL} |"
            echo "| 강제 알림 (테스트) | ${FORCE_NOTIFY} |"
            echo "| 확인 시각 (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |"
            echo "| 확인 시각 (JST) | $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S') |"
          } >> "$GITHUB_STEP_SUMMARY"
